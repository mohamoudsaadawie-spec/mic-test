<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Microphone Test</title>
</head>

<body style="font-family:Arial;text-align:center">

<h2>اضغط الزر لتفعيل الميكروفون</h2>

<button onclick="startMic()">Start Microphone</button>

<p id="status"></p>

<script>

async function startMic(){

try{

const stream = await navigator.mediaDevices.getUserMedia({ audio:true });

document.getElementById("status").innerText = "Microphone permission granted";

}catch(err){

document.getElementById("status").innerText = "Microphone permission denied";

}

}

</script>

</body>
</html>
